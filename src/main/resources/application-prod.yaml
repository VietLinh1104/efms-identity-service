spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: ${SHOW_SQL:false}
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

server:
  port: ${PORT:8081}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"

# Trong application-prod.yaml
efms:
  app:
    jwtSecret: ${JWT_SECRET}
    jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000}
    allowed-origins: ${ALLOWED_ORIGINS:*}
    base-url: ${EFMS_APP_BASE_URL:https://api.hnhdecor.com} # Thêm dòng này
    frontend-url: ${PUBLIC_EFMS_APP_FRONTEND_URL:https://efms.hnhdecor.com} # Thêm dòng này


resend:
  api-key: ${RESEND_API_KEY}
  from-email: ${RESEND_FROM_EMAIL:noreply@hnhdecor.com}