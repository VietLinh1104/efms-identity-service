spring:
  config:
    activate:
      on-profile: prod

  mail:
    host: smtp.zoho.com
    port: ${ZOHO_PORT:465} # Đặt giá trị mặc định là 465 nếu biến môi trường bị thiếu
    username: ${ZOHO_EMAIL}
    password: ${ZOHO_PASSWORD}
    protocol: smtps # Bắt buộc dùng giao thức SMTPS
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true # Bật SSL thay vì STARTTLS
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
        debug: true # Giữ nguyên để dễ debug, có thể tắt (false) khi đã chạy ổn định

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: ${SHOW_SQL:false}
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Ho_Chi_Minh

server:
  port: ${PORT:8080}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"

efms:
  app:
    jwtSecret: ${JWT_SECRET}
    jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000}
    allowed-origins: ${ALLOWED_ORIGINS:*}