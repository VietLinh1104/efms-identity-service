version: '3.8'

services:
  identity-service:
    build: .
    container_name: efms-identity-service
    ports:
      - "${PORT:-8081}:${PORT:-8081}"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
      - DB_URL=${DB_URL:-jdbc:postgresql://identity-db:5432/efms_db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-yourpassword}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-onboarding@resend.dev}
      - PUBLIC_EFMS_APP_FRONTEND_URL=${PUBLIC_EFMS_APP_FRONTEND_URL:-http://localhost:5173}

